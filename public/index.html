<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>coderoot API</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
        border-radius: 14px;
        max-width: 520px;
        padding: 28px;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 10px;
      }

      p {
        color: color-mix(in srgb, currentColor 65%, transparent);
        line-height: 1.6;
        margin: 0;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>coderoot API</h1>
      <p>This deployment serves the Coderoot GitHub App API. The Chrome Extension calls <code>/api/auth/*</code> and <code>/api/github/save</code>.</p>
    </main>
  </body>
</html>
